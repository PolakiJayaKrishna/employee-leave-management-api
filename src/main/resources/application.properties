# Server Port (Railway/Render injects PORT automatically)
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always

# Database Connection Settings (Dynamically uses Render's PostgreSQL or Local MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/elms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
# We removed driver-class-name and dialect so Spring Boot auto-detects based on the URL!

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
security.jwt.expiration-time=${JWT_EXPIRATION:86400000}